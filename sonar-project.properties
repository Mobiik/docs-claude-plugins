# =============================================================================
# SonarCloud project configuration — Mobiik skeleton template
# =============================================================================
# Este archivo es un SKELETON inyectado por scripts/inject-skeleton.sh al
# bootstrap de un repo nuevo. NO se restaura via self-heal (no es canonical).
#
# COMPORTAMIENTO INTENCIONAL: con los placeholders abajo el stage 7
# (sonarqube-gate) del Quality Gate pipeline FALLARA, porque PLEASE_REPLACE_*
# no son projectKey/projectName validos en SonarCloud.
#
# Esto es deliberado: forza al owner del repo a:
#   1. Registrar el proyecto en SonarCloud (https://sonarcloud.io/projects/create)
#   2. Reemplazar PLEASE_REPLACE_PROJECT_KEY con el projectKey real (ej. mobiik_zucarmex-payment)
#   3. Reemplazar PLEASE_REPLACE_PROJECT_NAME con un nombre legible
#   4. Ajustar sonar.sources/sonar.tests/sonar.exclusions segun el stack
#
# Si el repo NO va a usar Sonar:
#   - Eliminar este archivo (el stage 7 hace skip elegante con `hashFiles`)
#   - Documentar la decision en docs/architecture.md del repo
#
# Si necesitas ayuda con la config inicial, ejecutar el script asistente:
#   $ ./scripts/setup-sonar.sh   (genera projectKey auto-derivado del repo name)
# =============================================================================

# ----- Identificacion del proyecto (REEMPLAZAR los PLEASE_REPLACE_*) -----
sonar.projectKey=PLEASE_REPLACE_PROJECT_KEY
sonar.organization=mobiik
sonar.projectName=PLEASE_REPLACE_PROJECT_NAME
sonar.projectVersion=1.0

# ----- Codigo a analizar -----
sonar.sources=src/
sonar.tests=tests/

# ----- Exclusiones comunes -----
sonar.exclusions=**/node_modules/**,**/vendor/**,**/dist/**,**/build/**,**/target/**,**/*.min.js,**/coverage/**

# ----- Lenguaje principal (descomentar UNO si no se auto-detecta) -----
# sonar.language=js
# sonar.language=python
# sonar.language=java
# sonar.language=go
# sonar.language=cs

# ----- Coverage report paths por lenguaje (ajustar segun stack) -----
# JavaScript/TypeScript (Jest, Vitest):
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Python (pytest-cov):
# sonar.python.coverage.reportPaths=coverage.xml

# Java (JaCoCo):
# sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Go:
# sonar.go.coverage.reportPaths=coverage.out

# C# / .NET (dotnet-coverage):
# sonar.cs.opencover.reportsPaths=coverage.opencover.xml

# ----- Quality Gate enforcement -----
# Wait for SonarCloud quality gate result antes de marcar el job como passed.
# El stage 7 del reusable-ci.yml usa sonarsource/sonarqube-quality-gate-action.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
