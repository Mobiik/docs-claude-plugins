# Dependabot configuration template — Mobiik canonical
#
# Este archivo es la PLANTILLA inyectada a cada repo de la org via:
#   - scripts/bootstrap-org.sh (repos existentes)
#   - .github/workflows/self-heal.yml (drift fix semanal)
#   - .github/workflows/new-repo-init.yml (repos nuevos)
#
# El archivo destino en cada repo es: .github/dependabot.yml
# NO modificar este template sin coordinar con @Mobiik/platform-engineering.
# Cambios aquí se propagan a TODA la org en el próximo ciclo de self-heal.
#
# Cobertura: 18 ecosystems oficiales de Dependabot. Cada repo recibe PRs solo
# para los ecosystems con manifest matching (Dependabot ignora silenciosamente
# los que no aplican — sin errores, sin PRs irrelevantes).
#
# Stacks cubiertos:
#   - JavaScript / TypeScript / React / Angular / Vue / Next.js / etc. → npm
#   - Python / Django / FastAPI                                         → pip
#   - C# / .NET                                                         → nuget
#   - Java                                                              → maven, gradle
#   - Flutter / Dart                                                    → pub
#   - Go                                                                → gomod
#   - Rust                                                              → cargo
#   - PHP                                                               → composer
#   - Ruby                                                              → bundler
#   - Swift / iOS                                                       → swift
#   - Elixir                                                            → mix
#   - Docker (base images)                                              → docker
#   - Docker Compose                                                    → docker-compose
#   - Terraform / OpenTofu                                              → terraform
#   - Helm Charts                                                       → helm
#   - DevContainers                                                     → devcontainers
#   - GitHub Actions (workflows)                                        → github-actions
#
# Para stacks NO cubiertos (bash scripts, PowerShell, asdf .tool-versions, etc.)
# considerar Renovate Bot como complemento. Ver docs/architecture.md sección
# "Cobertura Dependabot vs Renovate".

version: 2

updates:
  # ============================================================================
  # npm / Node.js
  # ============================================================================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ============================================================================
